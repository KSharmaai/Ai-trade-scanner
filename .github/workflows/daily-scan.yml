name: Daily Trade Scan

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-trade-scanner

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_scan.py

      - name: Commit memo and trade log
        run: |
          git config user.name "AI Trade Scanner Bot"
          git config user.email "bot@users.noreply.github.com"
          git add logs/ data/ || true
          git diff --cached --quiet || git commit -m "Daily scan $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
